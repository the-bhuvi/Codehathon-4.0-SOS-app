name: safe_alert
description: SafeAlert - AI-Powered SOS Emergency Response App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  dio: ^5.4.0
  supabase_flutter: ^2.5.0
  shared_preferences: ^2.2.3
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  uuid: ^4.3.3
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.0
  flutter_local_notifications: ^17.1.2
  path_provider: ^2.1.2
  audioplayers: ^6.0.0
  flutter_animate: ^4.5.0
  url_launcher: ^6.2.5
  record: ^6.0.0
  sensors_plus: ^5.0.1
  camera: ^0.11.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
